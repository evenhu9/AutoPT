# PSM系统配置
psm:
  # 整体状态机最大递归深度 (Scan→Vuln_select→Inquire→Exploit→Check 循环)
  # 每个状态转换消耗1次递归，完整一轮约5次，允许重试3轮需要约15次
  sys_iterations: 20
  
  # Exploit Agent 最大迭代次数 (每次迭代=一次工具调用)
  # 漏洞利用通常需要多次尝试：探测→构造payload→执行→验证
  exp_iterations: 5
  
  # Inquire Agent 最大迭代次数
  # 用于从GitHub获取PoC，通常1-2次ReadHTML调用即可
  query_iterations: 2
  
  # Scan Agent 最大迭代次数
  # xray扫描+ServicePort查询，通常2次足够
  scan_iterations: 2
  
  # 调试模式：打印详细执行日志
  debug: True
  
  # 是否生成状态机流程图
  draw_graph: False


# AI配置
ai:
  # api config
  openai_base: "https://api.whatai.cc/v1"
  openai_key: "sk-CUOVrhG13Dg2ynz8WxQSrvuBwJliZ3A3Y8OKzXAYRB62Zu3M"
  # NVIDIA API配置（使用Llama模型时需要）
  nvidia_key: ""
  # hyperparameters
  temperature: 0.5
  # API超时配置（秒）- thinking模型需要较长时间
  request_timeout: 300
  # 失败重试次数
  max_retries: 2


# 测试配置
test:
  test_path: "../bench/data.jsonl"
  output_path: "result"
  save_history: True # 是否保存历史记录
  save_command: True # 是否保存命令
  # models: ['gpt35turbo', 'gpt4omini', 'gpt4o']
  models: ['gemini-3.1-pro-preview-thinking-high']
  